# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 一、基础行为
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
mixed-port: 7890          # HTTP + SOCKS5 混合端口
allow-lan: false          # 是否允许局域网设备使用代理（按需开启）
bind-address: "*"
mode: rule                # rule / global / direct
log-level: warning        # silent / error / warning / info / debug
ipv6: false               # 国内环境关闭 IPv6，减少泄漏面
unified-delay: true       # 统一延迟测试口径（去除握手耗时）
tcp-concurrent: true      # TCP 并发，加快连接速度
find-process-mode: strict # 严格进程匹配，规则更准确

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 二、Profile：持久化
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
profile:
  store-selected: true    # 记住手动选择的节点，重启不丢失
  store-fake-ip: true     # 持久化 fake-ip 映射表，重启后存量 TCP 连接不断裂

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 三、TUN 网卡：全流量接管
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
tun:
  enable: true
  stack: system           # system 兼容性最好；追求性能可改 gvisor
  auto-route: true        # 自动添加路由表，接管所有出站流量
  auto-detect-interface: true
  dns-hijack:
    - udp://any:53        # 劫持 UDP DNS，防绕过
    - tcp://any:53        # 劫持 TCP DNS，防绕过（iOS/macOS 部分 App 用 TCP）
    # - tcp://any:853     # 如需拦截 DoT 再启用
  strict-route: true      # 严格路由，阻止流量绕过 TUN 网卡

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 四、Sniffer：流量域名还原
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# TUN 接管后数据包只有 IP，Sniffer 从协议层还原域名
# 是 fake-ip 模式下规则精准匹配的关键
sniffer:
  enable: true
  force-dns-mapping: true   # 对 fake-ip 映射的连接强制还原域名
  parse-pure-ip: true       # 对直接用 IP 访问的流量也尝试还原
  override-destination: true

  # 跳过嗅探的域名（这些流量不需要 SNI 解析或解析有副作用）
  skip-domain:
    - "+.push.apple.com"    # APNs 推送，嗅探会干扰
    - "+.io.mi.com"         # 小米米家云
    - "+.mijia.com"
    - "Mijia Cloud"         # 米家 mDNS 广播名（保留兼容）
    - "+.home.mi.com"

  sniff:
    TLS:
      ports: [443, 8443]
    HTTP:
      ports: [80, "8080-8880"]
    QUIC:
      ports: [443, 8443]    # 识别 HTTP/3 流量

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 五、Hosts：DoH 服务器静态 IP 绑定
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 核心防鸡生蛋设计：
# Mihomo 发起 DoH 请求时需要解析 DoH 服务器域名本身，
# 若依赖 DNS 则形成循环。直接硬编码 IP，彻底断开循环。
# 比 default-nameserver 方案更快、更干净。
hosts:
  # 国内 DoH
  "dns.alidns.com":      ["223.5.5.5",  "223.6.6.6"]
  "doh.pub":             ["1.12.12.12", "120.53.53.53"]
  "dns.dnspod.cn":       ["1.12.12.12", "120.53.53.53"]
  # 国外 DoH（走代理）
  "cloudflare-dns.com":  ["1.1.1.1",   "1.0.0.1"]
  "dns.google":          ["8.8.8.8",   "8.8.4.4"]
  "dns64.dns.google":    ["8.8.8.8",   "8.8.4.4"]

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 六、DNS：核心防泄漏配置
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  prefer-h3: false          # H3/QUIC 依赖 UDP 转发，若节点不支持会 fallback 产生短暂明文窗口
                            # 确认节点支持 UDP 后可改 true
  use-hosts: true           # 启用上方 hosts 静态绑定（必须为 true）
  use-system-hosts: false   # 不读取系统 hosts，避免污染
  respect-rules: false      # 【重要】不让 DNS 请求走路由规则，避免规则→DNS→规则死锁
                            # 已有 nameserver-policy 精确分流，无需此选项
  cache-algorithm: arc      # ARC 缓存命中率优于 LRU

  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  # fake-ip-range6: fdfe:dcba:9876::/64  # ipv6: false 时不需要

  # ── fake-ip 白名单 ──────────────────────────────
  # 以下域名返回真实 IP 而非 fake-ip，原因各不同：
  # 1. 系统服务需要真实 IP 建立连接（NTP / STUN / 网络探测）
  # 2. 本地回环 / mDNS / 局域网服务
  fake-ip-filter:
    # 私有域名（局域网、内网服务）
    - "*.lan"
    - "*.local"
    - "*.localdomain"
    - "*.internal"
    - "*.home.arpa"

    # NTP 时间同步（fake-ip 会导致时间同步失败）
    - "+.pool.ntp.org"
    - "+.ntp.org"
    - "time.*.com"
    - "time.*.apple.com"
    - "time.windows.com"
    - "ntp.*.com"

    # STUN（WebRTC、游戏 P2P，用 fake-ip 会导致连接失败）
    - "stun.*.*"
    - "stun.*.*.*"
    - "+.stun.*"
    - "+.stun.*.*"
    - "+.stun.*.*.*"
    - "+.stun.l.google.com"

    # 微软网络连通性检测（用 fake-ip 会显示"无网络"）
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"
    - "msftncsi.com"

    # Apple 强制门户 / 网络检测
    - "captive.apple.com"
    - "+.captive.apple.com"
    - "connectivitycheck.gstatic.com"   # Android 网络检测

    # 腾讯 / QQ 本地回环
    - "localhost.ptlogin2.qq.com"
    - "localhost.sec.qq.com"

    # Xbox / 微软游戏
    - "+.xboxlive.com"
    - "+.xbox.com"

    # Steam P2P
    - "+.steamserver.net"
    - "*.steamcontent.com"

  # ── 底层解析：仅用于解析 DoH 服务器域名本身 ──────
  # 配合 hosts 静态绑定后，这里实际上几乎不会被调用
  # 保留作为最后兜底（明文 UDP，ISP 可见，但只会暴露 DoH 域名，不暴露业务域名）
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29

  # ── 直连流量专用 DNS（TUN 模式下 DIRECT 出站的域名解析）──
  direct-nameserver:
    - "https://dns.alidns.com/dns-query#DIRECT"
    - "https://doh.pub/dns-query#DIRECT"
  direct-nameserver-follow-policy: false  # 【注意】此字段必须在 dns 块内

  # ── 节点域名专用 DNS（解析代理节点地址，防鸡生蛋）──
  proxy-server-nameserver:
    - "https://dns.alidns.com/dns-query"
    - "https://doh.pub/dns-query"

  # ── 兜底 DNS：未被 policy 匹配的域名走这里 ──────────
  # 强制走代理出站，国外域名不经国内 DNS 解析，防泄漏
  nameserver:
    - "https://cloudflare-dns.com/dns-query"  # 出站走代理（默认）
    - "https://dns.google/dns-query"           # 同上

  # ── 精确分流策略（核心）────────────────────────────
  # 执行优先级高于 nameserver
  nameserver-policy:
    # 国内域名 + 私有域名 → 国内 DoH 直连
    # #DIRECT 明确指定出站方向，避免路由规则把 DoH 请求送进代理
    "geosite:cn,private":
      - "https://dns.alidns.com/dns-query#DIRECT"
      - "https://doh.pub/dns-query#DIRECT"

    # 明确的国外域名 → 强制走代理侧 DoH
    "geosite:geolocation-!cn":
      - "https://cloudflare-dns.com/dns-query"
      - "https://dns.google/dns-query"

